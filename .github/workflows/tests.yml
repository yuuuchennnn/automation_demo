name: tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_services/greeter/go.mod
          cache-dependency-path: go_services/greeter/go.sum

      - name: Build and test Go service
        working-directory: go_services/greeter
        run: |
          make build
          go test ./...

      - name: Start Go gRPC server
        working-directory: go_services/greeter
        run: |
          make start-server-bg ADDR=127.0.0.1:50051

      - name: Wait for server
        run: |
          python3 - <<'PY'
          import socket
          import sys
          import time

          for _ in range(30):
              with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as sock:
                  sock.settimeout(1)
                  try:
                      sock.connect(("127.0.0.1", 50051))
                  except OSError:
                      time.sleep(1)
                      continue
                  sys.exit(0)

          print("Go gRPC server did not start in time", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python_client/requirements.txt

      - name: Install Python dependencies
        working-directory: python_client
        run: make setup

      - name: Run Python tests
        working-directory: python_client
        run: make test ADDR=127.0.0.1:50051

      - name: Stop Go server
        if: always()
        working-directory: go_services/greeter
        run: make stop-server || true