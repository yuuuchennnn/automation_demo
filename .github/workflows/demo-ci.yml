name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go_services/grpc_demo/go.sum

      - name: Build Go Services
        run: |
          cd go_services/grpc_demo
          go build -v -o bin/grpc-server ./cmd/server/main.go
          cd ../http_demo
          go build -v -o bin/http-demo-server ./cmd/server/main.go

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: python_client/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r python_client/requirements.txt
          pip install pytest allure-pytest

      - name: Start Services & Run API Tests
        run: |
          ./go_services/grpc_demo/bin/grpc-server > grpc_server.log 2>&1 &
          ./go_services/http_demo/bin/http-demo-server > http_server.log 2>&1 &
          sleep 3
          cd python_client
          pytest TestCase/Test_Demo --alluredir=allure-results -v --tb=short

      - name: Print Service Logs on Failure
        if: failure()
        run: |
          echo "=== gRPC Server ===" && cat grpc_server.log || true
          echo "=== HTTP Server ===" && cat http_server.log || true

      - name: Download Allure
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: allure generate python_client/allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-api-${{ github.run_number }}
          path: allure-report/
          retention-days: 14


  selenium-ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: python_client/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r python_client/requirements.txt

      - name: Run Selenium Tests
        run: |
          cd python_client
          pytest TestCase/TC_Selenium -m ui_selenium --alluredir=allure-results -v --tb=short

      - name: Download Allure
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: allure generate python_client/allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-selenium-${{ github.run_number }}
          path: allure-report/
          retention-days: 14

 
  playwright-ui-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: python_client/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r python_client/requirements.txt
          playwright install chromium --with-deps

      - name: Run Playwright Tests
        run: |
          cd python_client
          pytest TestCase/TC_Playwright -m ui_playwright --alluredir=allure-results -v --tb=short

      - name: Download Allure
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          echo "$PWD/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: allure generate python_client/allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-playwright-${{ github.run_number }}
          path: allure-report/
          retention-days: 14